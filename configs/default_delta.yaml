# Delta-run configuration: trains only the ridge replacement plus baselines.
# Baselines are retained for zero-cost determinism sanity-checks
# (~5 s per horizon total).
#
# Reused unchanged from run 180526:
#   - random_forest (seeded, identical config -> bit-identical output)
#   - gradient_boosting (seeded, identical config -> bit-identical output)
#   - lstm, gru, tcn (only valid if the 180526 DL settings are accepted for
#     the final comparison)
#
# Retrained here:
#   - ridge (new model, replaces linear_regression which had RMSE explosion;
#     alpha selected by chronological folds inside the training split)
#
# Use:
#   python -m weather_forecasting_pipeline train --config configs/default_delta.yaml
#   python scripts/snapshot_run.py --run-id <YYMMDD>_delta
#   python scripts/merge_run_snapshots.py \
#       --baseline runs/180526 \
#       --delta runs/<YYMMDD>_delta \
#       --full-config configs/default.yaml \
#       --output runs/<YYMMDD>_final
#
# Every non-models field MUST track configs/default.yaml so the supervised
# parquets, splits, scalers, and metrics are produced under identical
# methodology to run 180526. If you change anything here that is not under
# `models`, document it in CHANGES.md before running.

project:
  name: nea_triglia_short_term_weather_forecasting
  random_seed: 42

paths:
  raw_data_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  artifacts_dir: artifacts
  mapping_config: configs/weathercloud_mapping.yaml

data:
  source: weathercloud
  timezone: Europe/Athens
  expected_frequency: 10min
  resample_rule:
  target: temp_c
  horizons:
    h01: 6
    h03: 18
    h06: 36
    h12: 72
  optional_horizons:
    m10: 1
    h24: 144
  lags: [1, 3, 6, 12, 24, 72, 144]
  rolling_windows: [6, 18, 36, 144]
  sequence_length: 144
  derived_metrics: [dew_point, vpd, heat_index, wind_chill]
  dl_exclude_lag_features: true

split:
  train: 0.70
  validation: 0.15
  test: 0.15

scaling:
  method: standard

models:
  # Delta roster: baselines (sanity check) + ridge only. Other model
  # artifacts are reused from runs/180526 via scripts/merge_run_snapshots.py.
  baselines: [persistence, moving_average, climatology]
  ml: [ridge]
  dl: []

training:
  max_epochs: 40
  batch_size: 32
  learning_rate: 0.001
  patience: 10
  grad_clip_norm: 1.0
  min_dl_train_rows: 300
  horizon_workers: 1
  torch_threads_per_worker: 2
  progress_heartbeat_seconds: 60
  progress_log_epochs: true

evaluation:
  mape_epsilon: 1.0e-6
  plot_max_points: 500
