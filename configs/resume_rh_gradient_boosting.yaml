# Temporary resume config for the interrupted RH supplementary ML run.
# Trains only the missing gradient boosting horizons without clearing artifacts.

project:
  name: nea_triglia_short_term_weather_forecasting
  random_seed: 42

paths:
  raw_data_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  artifacts_dir: artifacts
  mapping_config: configs/weathercloud_mapping.yaml

data:
  source: weathercloud
  timezone: Europe/Athens
  expected_frequency: 10min
  resample_rule:
  target: rh_pct
  horizons:
    h06: 36
    h12: 72
  optional_horizons:
    h24: 144
  lags: [1, 3, 6, 12, 24, 72, 144]
  rolling_windows: [6, 18, 36, 144]
  sequence_length: 144
  derived_metrics: [dew_point, vpd, heat_index, wind_chill]
  dl_exclude_lag_features: true

split:
  train: 0.70
  validation: 0.15
  test: 0.15

scaling:
  method: standard

models:
  baselines: []
  ml: [gradient_boosting]
  dl: []

training:
  max_epochs: 40
  batch_size: 32
  learning_rate: 0.001
  patience: 10
  grad_clip_norm: 1.0
  min_dl_train_rows: 300
  horizon_workers: 1
  torch_threads_per_worker: 2
  progress_heartbeat_seconds: 60
  progress_log_epochs: true

evaluation:
  mape_epsilon: 1.0e-6
  plot_max_points: 500
