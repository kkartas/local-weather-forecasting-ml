project:
  name: nea_triglia_short_term_weather_forecasting
  random_seed: 42

paths:
  raw_data_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  artifacts_dir: artifacts
  mapping_config: configs/weathercloud_mapping.yaml

data:
  source: weathercloud
  timezone: Europe/Athens
  expected_frequency: 10min
  resample_rule:
  target: temp_c
  horizons:
    h01: 6
    h03: 18
    h06: 36
    h12: 72
  optional_horizons:
    m10: 1
    h24: 144
  lags: [1, 3, 6, 12, 24, 72, 144]
  rolling_windows: [6, 18, 36, 144]
  sequence_length: 144
  derived_metrics: [dew_point, vpd, heat_index, wind_chill]

split:
  train: 0.70
  validation: 0.15
  test: 0.15

scaling:
  method: standard

models:
  baselines: [persistence, moving_average, climatology]
  ml: [linear_regression, random_forest, gradient_boosting, svr]
  dl: [lstm, gru, tcn]

training:
  max_epochs: 20
  batch_size: 32
  learning_rate: 0.001
  patience: 5
  min_dl_train_rows: 300

evaluation:
  mape_epsilon: 1.0e-6
  plot_max_points: 500
