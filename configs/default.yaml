project:
  name: nea_triglia_short_term_weather_forecasting
  random_seed: 42

paths:
  raw_data_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  artifacts_dir: artifacts
  mapping_config: configs/weathercloud_mapping.yaml

data:
  source: weathercloud
  timezone: Europe/Athens
  expected_frequency: 10min
  resample_rule:
  target: temp_c
  horizons:
    h01: 6
    h03: 18
    h06: 36
    h12: 72
  optional_horizons:
    m10: 1
    h24: 144
  lags: [1, 3, 6, 12, 24, 72, 144]
  rolling_windows: [6, 18, 36, 144]
  sequence_length: 144
  derived_metrics: [dew_point, vpd, heat_index, wind_chill]
  # DL feature policy: lag columns are redundant with the sequence axis, so
  # they are excluded from per-timestep DL inputs. Set to false (or supply
  # `dl_feature_columns: [...]` instead) to use the wide tabular feature set.
  dl_exclude_lag_features: true

split:
  train: 0.70
  validation: 0.15
  test: 0.15

scaling:
  method: standard

models:
  # Roster notes:
  #   - svr is excluded from the default roster (consistent under-performance
  #     and intractable O(n^2-n^3) fit cost on the full training set).
  #   - the linear baseline is ridge (alpha in {0.1, 1, 10, 100}, selected by
  #     chronological folds and fit with an lsqr solver) rather than plain OLS,
  #     to remove the RMSE explosion seen on the wide lag matrix.
  baselines: [persistence, moving_average, climatology]
  ml: [ridge, random_forest, gradient_boosting]
  dl: [lstm, gru, tcn]

training:
  # DL stability bundle: max_epochs 40 and patience 10 give the loss surface
  # time to recover from transient plateaus; grad_clip_norm protects against
  # the exploding-gradient events that can collapse long-horizon DL training.
  # The training loop additionally attaches a ReduceLROnPlateau scheduler
  # (factor 0.5, patience 3, min_lr 1e-5); its parameters are intentionally
  # not exposed here because they are part of the stability bundle, not a
  # tuning knob.
  max_epochs: 40
  batch_size: 32
  learning_rate: 0.001
  patience: 10
  grad_clip_norm: 1.0
  min_dl_train_rows: 300
  # Process-level parallelism over forecast horizons. ``1`` (default) keeps
  # the strictly sequential behaviour. Higher values train each horizon's
  # full pipeline in its own worker process and are capped at
  # ``min(value, n_horizons, cpu_count)``. When >1 the random forest is
  # forced to ``n_jobs=1`` to avoid outer x inner CPU oversubscription.
  # Keep sequential by default because each worker applies the MetDataPy
  # scaler to a wide float64 feature frame before model fitting. Higher values
  # may work on larger RAM hosts but can fail on the target dissertation
  # machine.
  horizon_workers: 1
  # Cap each worker's BLAS/MKL/PyTorch thread pool so N workers x M inner
  # threads do not contend on the same CPU set. ``null`` would auto-resolve
  # to ``max(1, cpu_count // horizon_workers)``; we set 2 explicitly to keep
  # the worker RAM and CPU budget conservative on the target host.
  torch_threads_per_worker: 2
  progress_heartbeat_seconds: 60
  progress_log_epochs: true

evaluation:
  mape_epsilon: 1.0e-6
  plot_max_points: 500
