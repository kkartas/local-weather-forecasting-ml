project:
  name: smoke_weather_forecasting_pipeline
  random_seed: 42

paths:
  # Isolated raw directory holding only the synthetic smoke CSV, so the smoke
  # run never ingests the committed real exports in data/raw. Populate it with
  # `python scripts/generate_smoke_raw_data.py`.
  raw_data_dir: data/raw_smoke
  interim_dir: data/interim
  processed_dir: data/processed
  artifacts_dir: artifacts
  mapping_config: configs/weathercloud_mapping.yaml

data:
  source: weathercloud
  timezone: Europe/Athens
  expected_frequency: 10min
  resample_rule:
  target: temp_c
  horizons:
    m10: 1
    h01: 6
  optional_horizons: {}
  # Kept deliberately small so the smoke feature count stays well below the
  # synthetic training-row count; this keeps ridge well-conditioned on the
  # smoke fixture while still exercising the lag/rolling/derived feature paths.
  lags: [1, 3, 6]
  rolling_windows: [6]
  sequence_length: 12
  derived_metrics: [dew_point, vpd, heat_index, wind_chill]
  dl_exclude_lag_features: true

split:
  train: 0.70
  validation: 0.15
  test: 0.15

scaling:
  method: standard

models:
  # ridge is used in line with default.yaml so CI exercises the same model
  # factory branch as the full experiment.
  baselines: [persistence, moving_average]
  ml: [ridge]
  dl: [gru]

training:
  max_epochs: 1
  batch_size: 16
  learning_rate: 0.001
  patience: 1
  min_dl_train_rows: 80
  horizon_workers: 1

evaluation:
  mape_epsilon: 1.0e-6
  plot_max_points: 200
