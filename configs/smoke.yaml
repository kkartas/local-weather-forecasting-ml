project:
  name: smoke_weather_forecasting_pipeline
  random_seed: 42

paths:
  raw_data_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  artifacts_dir: artifacts
  mapping_config: configs/weathercloud_mapping.yaml

data:
  source: weathercloud
  timezone: Europe/Athens
  expected_frequency: 10min
  resample_rule:
  target: temp_c
  horizons:
    m10: 1
    h01: 6
  optional_horizons: {}
  lags: [1, 3, 6, 12]
  rolling_windows: [6]
  sequence_length: 12
  derived_metrics: [dew_point, vpd, heat_index, wind_chill]

split:
  train: 0.70
  validation: 0.15
  test: 0.15

scaling:
  method: standard

models:
  baselines: [persistence, moving_average]
  ml: [linear_regression]
  dl: [gru]

training:
  max_epochs: 1
  batch_size: 16
  learning_rate: 0.001
  patience: 1
  min_dl_train_rows: 80

evaluation:
  mape_epsilon: 1.0e-6
  plot_max_points: 200
